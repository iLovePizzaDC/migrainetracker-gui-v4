name: CI & Deploy

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:

jobs:
    typecheck:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run type-check

    lint:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run lint

    security:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm audit --audit-level=high

    build:
        needs: [typecheck, lint, security]
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run build
              env:
                  VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            - uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist
                  retention-days: 1

    deploy:
        needs: build
        runs-on: self-hosted
        if: |
            github.ref == 'refs/heads/main' &&
            github.event_name == 'push' &&
            github.actor != 'github-actions[bot]'
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: dist
            - name: Copy dist to nginx
              run: |
                  rm -rf /var/www/migrainetracker/*
                  cp -r dist/* /var/www/migrainetracker/
            - name: Health Check
              run: curl --fail https://migrainetracker.de

    release:
        needs: deploy
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: googleapis/release-please-action@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  release-type: simple

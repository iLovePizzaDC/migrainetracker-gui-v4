name: CI & Deploy

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    workflow_dispatch:
permissions:
    contents: read

jobs:
    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
            - run: npm ci
            - run: npm run type-check

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
            - run: npm ci
            - run: npm run lint

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
            - run: npm ci
            - run: npm run test

    security:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
            - run: npm ci
            - run: npm audit --audit-level=high --omit=dev

    build:
        needs: [typecheck, lint, test, security]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm
            - run: npm ci
            - run: npm run build
              env:
                VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
            - uses: actions/upload-artifact@v4
              with:
                name: dist
                path: dist
                retention-days: 1

    deploy:
        needs: build
        runs-on: self-hosted
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          github.actor == 'google-release-please[bot]'
        steps:
            - uses: actions/download-artifact@v4
              with:
                name: dist
                path: dist
            - name: Backup current deployment
              run: |
                rm -rf /var/www/migrainetracker.bak
                cp -r /var/www/migrainetracker /var/www/migrainetracker.bak || true
            - name: Copy dist to nginx
              run: |
                rm -rf /var/www/migrainetracker/*
                cp -r dist/* /var/www/migrainetracker/
            - name: Health Check
              id: healthcheck
              run: sleep 5 && curl --fail --retry 3 --retry-delay 2 https://migrainetracker.de
            - name: Rollback on failure
              if: failure()
              run: |
                rm -rf /var/www/migrainetracker/*
                cp -r /var/www/migrainetracker.bak/* /var/www/migrainetracker/
                echo "Rollback completed"

    release:
        needs: deploy
        permissions:
            contents: write
            pull-requests: write
        runs-on: ubuntu-latest
        if: |
            always() &&
            needs.deploy.result == 'success'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: googleapis/release-please-action@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  release-type: simple

name: CI & Deploy

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    build:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - run: npm ci
            - run: npm run build

    deploy:
        needs: build
        runs-on: self-hosted
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - name: Copy dist to nginx
              run: |
                  rm -rf /var/www/migrainetracker/*
                  cp -r dist/* /var/www/migrainetracker/

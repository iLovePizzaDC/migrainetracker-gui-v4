name: Sync main → develop

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        uses: repo-sync/pull-request@v2
        with:
          source_branch: main
          destination_branch: develop
          pr_title: "Sync main → develop"
          pr_body: "Auto backmerge after release"
          github_token: ${{ secrets.GITHUB_TOKEN }}
